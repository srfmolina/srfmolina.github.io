name: Deploy to Codeberg Pages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: codeberg-medium
    container:
      # Debian 13 "trixie" ships glibc 2.41. The prebuilt `dx` binary installed
      # below is linked against glibc 2.39, which Debian 12 "bookworm" (glibc
      # 2.36) is too old to run (`GLIBC_2.39 not found`).
      image: rust:1-trixie
    steps:
      - name: Checkout
        # `actions/checkout` is a JavaScript action; Forgejo runs it with `node`
        # inside the job container, but the `rust` image ships no Node.js — the
        # run failed with `node` not found (exit 127) before the build. A shell
        # `git clone` needs no Node (git ships in the rust image), and the repo
        # is public, so an anonymous shallow clone of the tag is enough.
        run: |
          git clone --depth 1 --branch "${{ github.ref_name }}" \
            "${{ github.server_url }}/${{ github.repository }}.git" .

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install Dioxus CLI (official prebuilt binary)
        # `cargo install dioxus-cli` compiles the CLI from source (~8 min) and
        # blows Codeberg's ~10-min runner limit (run cancelled: "context deadline
        # exceeded"). Install the official prebuilt `dx` binary from the
        # DioxusLabs release instead — seconds, not minutes — and verify it
        # against the release's published SHA-256 so it's provably the official
        # artifact.
        run: |
          set -euo pipefail
          base="https://github.com/DioxusLabs/dioxus/releases/download/v0.7.9"
          file="dx-x86_64-unknown-linux-gnu.tar.gz"
          curl -sSfL "$base/$file" -o "$file"
          curl -sSfL "$base/dx-x86_64-unknown-linux-gnu.sha256" -o dx.sha256
          grep "  $file$" dx.sha256 | sha256sum -c -
          tar -xzf "$file"
          install -m 0755 dx /usr/local/bin/dx
          dx --version

      - name: Build web bundle (release)
        run: dx build --release --platform web

      - name: Verify build output exists
        run: test -f target/dx/portfolio/release/web/public/index.html

      - name: Publish to pages branch
        env:
          ACTOR: ${{ github.actor }}
          AUTO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -e
          # Prefer an explicitly-configured PAT if present; otherwise use the
          # ephemeral auto token. Never echo $TOKEN.
          TOKEN="${DEPLOY_TOKEN:-$AUTO_TOKEN}"
          cd target/dx/portfolio/release/web/public
          git init -b pages
          git config user.name "Codeberg CI"
          git config user.email "ci@codeberg.local"
          git add -A
          git commit -m "Deploy ${TAG}"
          git push --force "https://${ACTOR}:${TOKEN}@codeberg.org/srfmolina/pages.git" pages
